<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Каталог товаров</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛍️ Каталог товаров</h1>
            <p class="subtitle">Выберите понравившийся товар</p>
        </div>
        
        <div class="products-grid" id="productsGrid">
            <!-- Товары будут загружены через JS -->
        </div>
        
        <div class="footer">
            <p>© 2026 • Все права защищены</p>
        </div>
    </div>
    
    <!-- Модальное окно подтверждения -->
    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <h2 id="modalProductName">Название товара</h2>
            <p class="modal-price" id="modalProductPrice">0 руб.</p>
            <p class="modal-desc" id="modalProductDesc">Описание товара</p>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn-confirm" onclick="confirmOrder()">Подтвердить заказ</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
