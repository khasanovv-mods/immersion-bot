<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления ботом</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
        }
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px;
        }
        .sidebar h2 {
            color: white;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .sidebar a {
            display: block;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 5px;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .content {
            margin-left: 250px;
            padding: 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
        }
        .logout {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            color: #888;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }
        .stat-card.total { border-top: 4px solid #667eea; }
        .stat-card.pending { border-top: 4px solid #f39c12; }
        .stat-card.approved { border-top: 4px solid #27ae60; }
        .stat-card.rejected { border-top: 4px solid #e74c3c; }
        .stat-card.answered { border-top: 4px solid #3498db; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>🤖 Bot Panel</h2>
        <a href="/" class="active">📊 Дашборд</a>
        <a href="/tickets">📋 Заявки</a>
        <a href="/logout">🚪 Выход</a>
    </div>
    
    <div class="content">
        <div class="header">
            <h1>📊 Дашборд</h1>
            <a href="/logout" class="logout">Выйти</a>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card total">
                <h3>Всего заявок</h3>
                <div class="value">{{ stats.total }}</div>
            </div>
            <div class="stat-card pending">
                <h3>В ожидании</h3>
                <div class="value">{{ stats.pending }}</div>
            </div>
            <div class="stat-card approved">
                <h3>Одобрено</h3>
                <div class="value">{{ stats.approved }}</div>
            </div>
            <div class="stat-card rejected">
                <h3>Отклонено</h3>
                <div class="value">{{ stats.rejected }}</div>
            </div>
            <div class="stat-card answered">
                <h3>Отвечено</h3>
                <div class="value">{{ stats.answered }}</div>
            </div>
        </div>
        
        <div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
            <h2 style="margin-bottom: 20px;">⚡ Быстрые действия</h2>
            <a href="/tickets" style="display: inline-block; background: #667eea; color: white; padding: 15px 30px; border-radius: 10px; text-decoration: none;">📋 Просмотреть все заявки</a>
            <a href="/tickets?status=pending" style="display: inline-block; background: #f39c12; color: white; padding: 15px 30px; border-radius: 10px; text-decoration: none; margin-left: 10px;">⏳ Новые заявки</a>
        </div>
    </div>
</body>
</html>
